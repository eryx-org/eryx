syntax = "proto3";

package eryx.v1;

// The Eryx sandbox execution service.
//
// Provides bidirectional streaming RPC for executing Python code in a
// sandboxed environment with callback support. The client sends an initial
// ExecuteRequest followed by CallbackResponse messages; the server streams
// back CallbackRequest, OutputEvent, and ExecuteResult messages.
service Eryx {
  // Execute Python code with bidirectional callback streaming.
  //
  // Protocol:
  //   1. Client sends ExecuteRequest as the first message
  //   2. Server may send CallbackRequest messages when Python invokes a callback
  //   3. Client responds with CallbackResponse for each CallbackRequest
  //   4. Server streams OutputEvent messages as Python produces output
  //   5. Server sends ExecuteResult as the final message
  rpc Execute(stream ClientMessage) returns (stream ServerMessage);
}

// Messages sent from the client (Go worker) to the server (Eryx).
message ClientMessage {
  oneof message {
    ExecuteRequest execute_request = 1;
    CallbackResponse callback_response = 2;
  }
}

// Messages sent from the server (Eryx) to the client (Go worker).
message ServerMessage {
  oneof message {
    CallbackRequest callback_request = 1;
    OutputEvent output_event = 2;
    ExecuteResult execute_result = 3;
    TraceEvent trace_event = 4;
  }
}

// Initial request to execute Python code.
message ExecuteRequest {
  // Python source code to execute.
  string code = 1;

  // Callback declarations that will be available to the Python code.
  // Each declaration defines a callback that Python can invoke via `await name(...)`.
  repeated CallbackDeclaration callbacks = 2;

  // Resource limits for the execution.
  ResourceLimits resource_limits = 3;

  // Whether to stream trace events during execution.
  // When true, the server will send TraceEvent messages for line execution,
  // function calls/returns, exceptions, and callback start/end events.
  bool enable_tracing = 4;

  // Whether to persist Python state between executions.
  // When true, the server will snapshot state after execution and include it
  // in the ExecuteResult. If state_snapshot is also provided, the server will
  // restore that state before executing code.
  bool persist_state = 5;

  // Previously captured state snapshot to restore before execution.
  // Only used when persist_state is true.
  bytes state_snapshot = 6;

  // Supporting files to write to the sandbox filesystem before execution.
  // Files are placed under /eryx/lib/ (MODULE) or /eryx/data/ (DATA) based on
  // their kind. Only MODULE files are added to sys.path for importing.
  repeated SupportingFile files = 7;

  // Network configuration. If absent, networking is disabled entirely.
  NetworkConfig network_config = 8;

  // Secrets to inject into the sandbox.
  // Each secret becomes an environment variable with a random placeholder value.
  // Real values are substituted in HTTP request headers to allowed hosts only.
  // Placeholder values are scrubbed from stdout/stderr by default.
  repeated SecretConfig secrets = 9;

  // Disable placeholder scrubbing on stdout. Default: scrubbing is ON when secrets are present.
  bool disable_stdout_scrub = 10;

  // Disable placeholder scrubbing on stderr. Default: scrubbing is ON when secrets are present.
  bool disable_stderr_scrub = 11;

  // Name of the variable captured from the script and returned in
  // ExecuteResult.result (JSON-serialized). Empty defaults to "result".
  string result_variable = 12;

  // Enable placeholder scrubbing on the structured result (and result_error).
  // Default: OFF. Unlike stdout/stderr (which default to scrubbing ON via the
  // disable_* fields above), the result is a programmatic side channel, so
  // scrubbing is opt-in.
  bool scrub_result = 13;

  // Callback-result replay (optional, backwards-compatible).
  //
  // PRESENCE of this field — even with an empty `entries` list — opts the
  // execution into journaling: the server records every callback invocation and
  // returns the journal in ExecuteResult.callback_journal. When `entries` is
  // non-empty, matching callbacks (by name + args + invocation position) are
  // replayed from the journal instead of being dispatched to the client, until
  // the first divergence (after which execution goes live).
  //
  // To start a replay session, send an empty `CallbackJournal{}` on the first
  // run and echo back the returned journal on subsequent runs. When this field
  // is ABSENT, execution behaves exactly as before (no journaling, no replay).
  //
  // SECURITY: replayed entries are returned to Python verbatim — the callback
  // is not re-executed. A valid HMAC signature (see CallbackJournal.signature)
  // attests that the journal is an unmodified record of a real execution of
  // THIS SCRIPT on a server holding the signing key. Signing does not (and
  // cannot) prevent the callback-answering client from choosing arbitrary
  // values live — it always could. What it provides is provenance and tamper
  // detection for journals that round-trip through storage or intermediaries.
  // The server rejects unsigned or mis-signed journals by discarding their
  // entries (falling back to fresh execution, not an error).
  CallbackJournal callback_journal = 14;
}

// Kind of supporting file — determines where it's placed in the sandbox.
enum FileKind {
  // Data file placed in /eryx/data/ (not importable). Default — files are
  // inert unless explicitly marked as modules.
  FILE_KIND_DATA = 0;
  // Python module placed in /eryx/lib/ and added to sys.path.
  FILE_KIND_MODULE = 1;
}

// A supporting file to place in the sandbox filesystem.
message SupportingFile {
  string name = 1;     // e.g. "helpers.py"
  string content = 2;
  FileKind kind = 3;
}

// Declaration of a callback that the Go worker can handle.
message CallbackDeclaration {
  // Callback name (e.g., "query_loki", "query_prometheus").
  // This becomes an async function in Python: `await query_loki(...)`.
  string name = 1;

  // Human-readable description of the callback.
  string description = 2;

  // Parameter definitions for this callback.
  repeated ParameterDeclaration parameters = 3;
}

// Declaration of a single parameter for a callback.
message ParameterDeclaration {
  // Parameter name.
  string name = 1;

  // JSON Schema type: "string", "number", "integer", "boolean", "object", "array".
  string json_type = 2;

  // Human-readable description of the parameter.
  string description = 3;

  // Whether this parameter is required.
  bool required = 4;
}

// Resource limits for sandbox execution.
message ResourceLimits {
  // Maximum execution time in milliseconds (0 = default 30s).
  uint64 execution_timeout_ms = 1;

  // Maximum callback timeout in milliseconds (0 = default 10s).
  uint64 callback_timeout_ms = 2;

  // Maximum memory in bytes (0 = default 128MB).
  uint64 max_memory_bytes = 3;

  // Maximum number of callback invocations (0 = default 1000).
  uint32 max_callback_invocations = 4;

  // Maximum fuel/instructions (0 = unlimited).
  uint64 max_fuel = 5;
}

// Network configuration for the sandbox.
// Controls which hosts Python code can connect to and sets timeouts.
message NetworkConfig {
  // Allowed host patterns (wildcards ok). Only checked when allow_all_hosts is false.
  repeated string allowed_hosts = 1;
  // Blocked host patterns. Checked before allowed. Private nets always blocked by Rust defaults.
  repeated string blocked_hosts = 2;
  // Maximum concurrent connections (0 = default 10).
  uint32 max_connections = 3;
  // Connection timeout in milliseconds (0 = default 30s).
  uint64 connect_timeout_ms = 4;
  // I/O read/write timeout in milliseconds (0 = default 60s).
  uint64 io_timeout_ms = 5;
  // When true, all non-blocked hosts are allowed (allowed_hosts is ignored).
  // When false (default), only hosts matching allowed_hosts are permitted.
  bool allow_all_hosts = 6;
}

// A secret to inject into the sandbox environment.
// The real value is never exposed to Python code — a random placeholder is
// used instead. The real value is substituted transparently in HTTP headers
// when making requests to allowed_hosts.
message SecretConfig {
  // Secret name (becomes the environment variable name in Python).
  string name = 1;
  // The real secret value. Transmitted in plaintext over the gRPC connection —
  // callers must ensure the transport is secure (e.g. localhost, mTLS, or TLS).
  string value = 2;
  // Hosts where this secret may be sent. Empty = falls back to NetworkConfig.allowed_hosts.
  repeated string allowed_hosts = 3;
}

// Server requests the client to execute a callback.
message CallbackRequest {
  // Unique ID for this callback invocation (UUID).
  // The client must include this ID in the corresponding CallbackResponse.
  string request_id = 1;

  // Name of the callback to invoke.
  string name = 2;

  // JSON-encoded arguments object.
  string arguments_json = 3;

  // W3C traceparent header for distributed trace propagation.
  // Allows the client to link callback handling spans as children of the
  // server-side callback span. Empty when tracing is not configured.
  string trace_context = 4;
}

// Client responds with the result of a callback invocation.
message CallbackResponse {
  // The request_id from the corresponding CallbackRequest.
  string request_id = 1;

  oneof result {
    // JSON-encoded result on success.
    string json_result = 2;

    // Error message on failure.
    string error = 3;
  }
}

// How a callback invocation resolved, for journaling and replay.
enum CallbackOutcome {
  // Success — the `value` is the JSON-encoded result.
  CALLBACK_OUTCOME_OK = 0;
  // Permanent failure — the `value` is the error message.
  CALLBACK_OUTCOME_ERROR = 1;
}

// A single recorded callback invocation in a replay journal.
message CallbackJournalEntry {
  // Position in the invocation sequence (0-indexed, in initiation order).
  uint32 index = 1;
  // Callback name.
  string name = 2;
  // Stable hash of the canonicalized arguments JSON (for fast comparison).
  uint64 args_hash = 3;
  // Canonicalized arguments JSON (for verification/debugging).
  string args_json = 4;
  // Whether the recorded invocation succeeded or failed.
  CallbackOutcome outcome = 5;
  // The JSON-encoded result value (OK) or the error message (ERROR).
  string value = 6;
}

// An ordered journal of callback invocations.
//
// Sent in ExecuteRequest to enable replay/journaling (presence-significant: an
// empty journal still turns journaling on) and returned in ExecuteResult with
// the invocations recorded during the run.
//
// SECURITY: a valid signature attests that this journal is an unmodified record
// of a real execution of a specific script on a server holding the signing key.
// The server signs outgoing journals and rejects unsigned or mis-signed ones by
// discarding their entries (falling back to fresh execution). The MAC covers
// both the entries and the script code, so a journal cannot be replayed against
// a different script.
message CallbackJournal {
  // Ordered callback invocations, in the order they were initiated.
  repeated CallbackJournalEntry entries = 1;
  // HMAC-SHA256 over the journal entries + script code. Produced by the server
  // using a configured signing key. Empty on the first request (no journal to
  // sign yet); the server returns a signed journal in the result.
  bytes signature = 2;
}

// Streaming output event from the sandbox.
message OutputEvent {
  // Which output stream this came from.
  OutputStream stream = 1;

  // The output data.
  string data = 2;
}

// Output stream identifier.
enum OutputStream {
  STDOUT = 0;
  STDERR = 1;
}

// Final execution result.
message ExecuteResult {
  // Whether execution completed successfully.
  bool success = 1;

  // Complete stdout output.
  string stdout = 2;

  // Complete stderr output.
  string stderr = 3;

  // Human-readable message for a *sandbox* failure (timeout, fuel exhaustion,
  // WASM trap, invalid input, etc.). Empty when execution succeeded AND empty
  // for an uncaught Python exception — in that case the traceback is in
  // `stderr` (as CPython would print it) and `failure_kind` is
  // FAILURE_KIND_SCRIPT_EXCEPTION. Use `failure_kind` to branch, not this string.
  string error = 4;

  // Execution statistics.
  ExecuteStats stats = 5;

  // Captured Python state snapshot after execution.
  // Only populated when persist_state was true in the request.
  bytes state_snapshot = 6;

  // JSON-serialized value of the script's result variable (default name
  // "result", configurable via ExecuteRequest.result_variable), or empty if
  // the variable was not set.
  string result = 7;

  // Why result capture failed (e.g. the value was not JSON-serializable), or
  // empty when capture succeeded or no result variable was set.
  string result_error = 8;

  // Why execution failed. FAILURE_KIND_UNSPECIFIED when success is true.
  // Distinguishes a script-level failure (an uncaught Python exception, with
  // its traceback in `stderr`) from sandbox-level failures (timeout, fuel
  // exhaustion, traps, invalid input), so callers can branch without parsing
  // the `error` string.
  FailureKind failure_kind = 9;

  // The callback journal recorded during this run, in initiation order.
  // Present only when the request opted into replay (sent a callback_journal).
  // Echo it back in the next ExecuteRequest to replay completed callbacks.
  CallbackJournal callback_journal = 10;
}

// Why an execution failed, when success is false.
enum FailureKind {
  // Execution succeeded; no failure.
  FAILURE_KIND_UNSPECIFIED = 0;
  // The script raised an uncaught Python exception. The traceback is in
  // `stderr` and `error` is empty.
  FAILURE_KIND_SCRIPT_EXCEPTION = 1;
  // Execution exceeded the configured wall-clock timeout.
  FAILURE_KIND_TIMEOUT = 2;
  // Execution exceeded the configured fuel (instruction) limit.
  FAILURE_KIND_FUEL_EXHAUSTED = 3;
  // A sandbox/infrastructure failure: WASM trap, invalid input (e.g. NUL bytes
  // in the code), session creation failure, or an internal runtime error.
  // Details are in `error`.
  FAILURE_KIND_SANDBOX_ERROR = 4;
  // Execution was cancelled before completing (e.g. the client disconnected).
  FAILURE_KIND_CANCELLED = 5;
}

// A trace event emitted during execution.
// Sent when enable_tracing is true in the ExecuteRequest.
message TraceEvent {
  // Line number in the source code.
  uint32 lineno = 1;

  // Event type: "line", "call", "return", "exception", "callback_start", "callback_end".
  string event_type = 2;

  // Function name (for "call" and "return" events).
  string function = 3;

  // Error/exception message (for "exception" events).
  string message = 4;

  // Callback name (for "callback_start" and "callback_end" events).
  string name = 5;

  // Callback duration in milliseconds (for "callback_end" events).
  uint64 duration_ms = 6;

  // Optional JSON-encoded context data (e.g., local variables).
  string context_json = 7;
}

// Execution statistics.
message ExecuteStats {
  // Total execution duration in milliseconds.
  uint64 duration_ms = 1;

  // Number of callback invocations.
  uint32 callback_invocations = 2;

  // Peak memory usage in bytes (0 if unavailable).
  uint64 peak_memory_bytes = 3;

  // Fuel consumed (0 if unavailable).
  uint64 fuel_consumed = 4;

  // Number of callbacks served from the replay journal (cache hits).
  // 0 when replay was not enabled or nothing matched.
  uint32 replayed_callbacks = 5;
}
